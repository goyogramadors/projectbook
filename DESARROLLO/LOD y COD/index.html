<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obra Digital MOP — Prototipo UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-background:#f8fafc;--bg-card:#ffffff;--bg-muted:#f1f5f9;--bg-muted-2:#e9eef5;
  --border-theme:#e2e8f0;--border-strong:#cbd5e1;
  --text-primary:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;
  --primary:#2563eb;--primary-soft:rgba(37,99,235,.12);
  --amber:#d97706;--amber-soft:rgba(217,119,6,.14);--green:#16a34a;--red:#dc2626;
  --od-header-h:56px;--od-subbar-h:40px;--od-statusbar-h:28px;--od-row-h:32px;
  --od-tree-w:clamp(450px,50%,690px);--od-context-w:clamp(288px,26%,380px);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;font-size:13px;line-height:1.35;color:var(--text-primary);background:var(--bg-background);-webkit-font-smoothing:antialiased;overflow:hidden}
button,select,input,textarea{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{height:var(--od-header-h);min-height:var(--od-header-h);display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:var(--bg-card);border-bottom:1px solid var(--border-theme)}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;white-space:nowrap;min-width:0}
.brand .glyph{color:var(--primary);font-size:15px}.brand .sep{color:var(--border-strong)}
.brand .contract{font-weight:500;color:var(--text-secondary)}.brand .safi{font-weight:400;color:var(--text-muted);font-size:12px}
.switcher{display:flex;align-items:center;gap:2px}
.switcher button{padding:6px 12px;border:1px solid transparent;border-radius:6px;color:var(--text-secondary);font-weight:500;background:transparent}
.switcher button:hover{background:var(--bg-muted)}
.switcher button.active{background:var(--primary-soft);color:var(--primary);border-color:rgba(37,99,235,.25);font-weight:600}
.switcher .gear{padding:6px 8px;color:var(--text-muted)}
.subbar{height:var(--od-subbar-h);min-height:var(--od-subbar-h);display:flex;align-items:center;gap:10px;padding:0 12px;background:var(--bg-muted);border-bottom:1px solid var(--border-theme)}
.subbar .crumb{display:flex;align-items:center;gap:6px;color:var(--text-secondary);font-size:12px;min-width:0;overflow:hidden;white-space:nowrap}
.subbar .crumb b{color:var(--text-primary);font-weight:600}.subbar .crumb .chev{color:var(--text-muted)}
.subbar .hamb{border:1px solid var(--border-theme);background:var(--bg-card);border-radius:5px;padding:3px 7px;color:var(--text-secondary)}
.subbar .spacer{flex:1}
.subbar label{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);font-weight:600}
.subbar select{background:var(--bg-card);border:1px solid var(--border-theme);border-radius:6px;padding:5px 8px;color:var(--text-primary);font-weight:500}
.subbar .search{display:flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--border-theme);border-radius:6px;padding:4px 9px;color:var(--text-muted);width:170px}
.subbar .search input{border:0;outline:0;background:transparent;font:inherit;color:var(--text-primary);width:100%}
.subbar .btn{border:1px solid var(--border-theme);background:var(--bg-card);border-radius:6px;padding:5px 11px;font-weight:500;color:var(--text-secondary)}
.subbar .btn:hover{border-color:var(--border-strong)}
.subbar .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.body{flex:1;display:flex;min-height:0;overflow:hidden}
.colA{width:var(--od-tree-w);min-width:var(--od-tree-w);border-right:1px solid var(--border-theme);background:var(--bg-card);overflow:hidden;display:flex;flex-direction:column}
.colB{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-background)}
.colC{width:var(--od-context-w);min-width:var(--od-context-w);border-left:1px solid var(--border-theme);background:var(--bg-card);overflow-y:auto}
.col-head{height:var(--od-subbar-h);display:flex;align-items:center;gap:8px;padding:0 12px;background:var(--bg-muted);border-bottom:1px solid var(--border-theme);font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);font-weight:600;flex:0 0 auto}
.statusbar{height:var(--od-statusbar-h);min-height:var(--od-statusbar-h);display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--bg-muted);border-top:1px solid var(--border-theme);font-size:11.5px;color:var(--text-muted);white-space:nowrap;overflow:hidden}
.statusbar .dot{width:4px;height:4px;border-radius:50%;background:var(--border-strong);flex:0 0 auto}
.tree{padding:6px 0;flex:1;overflow:auto}
.colA .foot{flex:0 0 auto;border-top:1px solid var(--border-theme);padding:8px 10px;background:var(--bg-card)}
.colA .foot .btn{width:100%;border:1px solid var(--border-theme);background:var(--bg-card);border-radius:6px;padding:7px 11px;color:var(--text-secondary);font-weight:500}
.colA .foot .btn:hover{border-color:var(--border-strong)}
.node-row{display:flex;align-items:center;gap:5px;min-height:var(--od-row-h);padding:4px 8px;cursor:pointer;border-left:2px solid transparent}
.node-row:hover{background:var(--bg-muted)}
.node-row:hover .rowact{opacity:1}
.node-row.sel{background:var(--primary-soft);border-left-color:var(--primary)}
.node-row.sel .label{color:var(--primary)}
.node-row .chev{width:12px;color:var(--text-muted);font-size:10px;flex:0 0 12px;text-align:center;transition:transform .15s}
.node-row .chev.open{transform:rotate(90deg)}.node-row .chev.leaf{visibility:hidden}
.node-row .ic{flex:0 0 auto;font-size:12px;opacity:.85}
.node-row .label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-row.folder .label{font-weight:700;color:var(--text-primary)}
.node-row.file .label{font-weight:400;color:var(--text-secondary)}
.node-row .count{font-size:10.5px;color:var(--text-muted);background:var(--bg-muted-2);border-radius:9px;padding:1px 7px;font-variant-numeric:tabular-nums;flex:0 0 auto}
.node-row .count.zero{background:transparent;border:1px solid var(--border-theme);color:var(--text-muted)}
.node-row .rowact{opacity:0;display:flex;gap:2px;flex:0 0 auto;transition:opacity .12s}
.node-row .rowact button{border:0;background:transparent;color:var(--text-muted);padding:2px 4px;border-radius:4px;font-size:12px}
.node-row .rowact button:hover{background:var(--bg-muted-2);color:var(--text-primary)}
.node-row.custom .label::after{content:" ·";color:var(--primary)}
.node-row.virtual .ic{opacity:.65}
.node-row.virtual .label{font-style:italic;font-weight:600;color:var(--text-secondary)}
.children.collapsed{display:none}
.toolbar-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border-theme);background:var(--bg-card);flex:0 0 auto}
.toolbar-row .btn{border:1px solid var(--border-theme);background:var(--bg-card);border-radius:6px;padding:5px 11px;font-weight:500;color:var(--text-secondary)}
.toolbar-row .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.toolbar-row .spacer{flex:1}
.toolbar-row .ctxname{font-size:11.5px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scroll{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{position:sticky;top:0;background:var(--bg-muted);z-index:1;text-align:left;font-weight:600;color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:.03em;padding:7px 12px;border-bottom:1px solid var(--border-theme)}
tbody td{padding:0 12px;height:34px;border-bottom:1px solid var(--border-theme);color:var(--text-secondary);white-space:nowrap}
tbody td.strong{color:var(--text-primary);font-weight:500;white-space:normal}
tbody tr:hover{background:var(--bg-muted)}tbody tr.clk{cursor:pointer}
tbody tr.auto{background:repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(148,163,184,.06) 6px,rgba(148,163,184,.06) 12px)}
tbody tr.auto td{color:var(--text-muted)}
.auto-detail td{height:auto;padding:2px 12px 8px 12px;font-size:11.5px;color:var(--text-muted);white-space:normal;font-style:italic}
.tabnum{font-variant-numeric:tabular-nums}
.chip{display:inline-flex;align-items:center;gap:4px;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:500}
.chip.ver{background:var(--primary-soft);color:var(--primary)}
.chip.auto{background:var(--bg-muted-2);color:var(--text-secondary)}
.chip.incid{background:var(--amber-soft);color:var(--amber)}
.chip.book{background:var(--bg-muted);color:var(--text-secondary);border:1px solid var(--border-theme)}
.dotv{color:var(--green);font-size:9px}
.det{padding:16px 18px}
.det h2{font-size:15px;font-weight:700;display:flex;align-items:flex-start;gap:8px;margin-bottom:3px}
.det h2 .bar{width:3px;height:16px;background:var(--primary);border-radius:2px;flex:0 0 auto;margin-top:2px}
.det .path{font-size:11.5px;color:var(--text-muted);margin-bottom:12px}
.det .desc{color:var(--text-secondary);font-size:12.5px;margin-bottom:14px;background:var(--bg-muted);border:1px solid var(--border-theme);border-radius:7px;padding:9px 11px}
.det .acts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.det .acts .btn{border:1px solid var(--border-theme);background:var(--bg-card);border-radius:6px;padding:7px 12px;font-weight:500;color:var(--text-secondary)}
.det .acts .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.det .acts .btn.danger{color:var(--red);border-color:rgba(220,38,38,.3)}
.det .divider{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);font-weight:600;margin:14px 0 7px}
.det ul{list-style:none}
.det ul li{padding:5px 8px;border-bottom:1px dashed var(--border-theme);color:var(--text-secondary);font-size:12.5px;display:flex;gap:7px;justify-content:space-between;align-items:center}
.det ul li .nm{display:flex;gap:7px}.det ul li .nm::before{content:"📄";opacity:.7}
.det ul li .nm.fold::before{content:"📁"}
.badge-norm{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-size:11.5px;color:var(--text-muted);background:var(--bg-muted);border:1px solid var(--border-theme);border-radius:6px;padding:5px 9px}
.fv-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed var(--border-theme);font-size:12.5px;gap:10px}
.fv-row span:first-child{color:var(--text-muted);flex:0 0 auto}.fv-row span:last-child{text-align:right}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--text-muted);padding:30px}
.empty .ico{font-size:30px;opacity:.55;margin-bottom:10px}
.empty p{margin-bottom:14px;font-size:13px;max-width:300px}
.empty .btn.primary{background:var(--primary);color:#fff;border:1px solid var(--primary);border-radius:6px;padding:7px 14px;font-weight:600}
.folio{border-bottom:1px solid var(--border-theme)}
.folio-head{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer}
.folio-head:hover{background:var(--bg-muted)}
.folio.open .folio-head{background:var(--primary-soft)}
.folio-id{font-weight:600;font-variant-numeric:tabular-nums;color:var(--text-primary);min-width:44px;flex:0 0 auto}
.folio-date{color:var(--text-muted);font-variant-numeric:tabular-nums;min-width:80px;flex:0 0 auto}
.folio-sub{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.folio-vinc{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;flex:0 0 auto}
.vermas{border:1px solid var(--border-theme);background:var(--bg-card);border-radius:6px;padding:4px 9px;color:var(--text-secondary);font-size:11.5px;flex:0 0 auto}
.folio.open .vermas{background:var(--primary);color:#fff;border-color:var(--primary)}
.folio-body{padding:6px 16px 16px 16px;background:var(--bg-card);animation:pop .2s ease}
.folio.auto .folio-head{background:repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(148,163,184,.06) 6px,rgba(148,163,184,.06) 12px);cursor:default}
.folio.auto .folio-id,.folio.auto .folio-sub{color:var(--text-muted)}
.btn-ver,.btn-dl{border:1px solid var(--border-theme);background:var(--bg-card);border-radius:5px;padding:2px 7px;font-size:11px;color:var(--text-secondary);cursor:pointer}.btn-arch{border:1px solid var(--border-theme);background:var(--bg-card);border-radius:5px;padding:2px 7px;font-size:11px;color:var(--text-secondary);cursor:pointer}.btn-arch:hover{border-color:var(--amber);color:var(--amber)}.folio-acts{margin-top:12px;display:flex;gap:8px}.btn-ver:hover,.btn-dl:hover{border-color:var(--primary);color:var(--primary)}
.toast{position:fixed;right:18px;bottom:38px;z-index:70;background:var(--bg-card);border:1px solid var(--border-theme);border-left:3px solid var(--green);border-radius:8px;box-shadow:0 8px 24px rgba(15,23,42,.12);padding:11px 14px;max-width:340px;font-size:12.5px;display:none}
.toast.show{display:block;animation:slidein .25s ease}
@keyframes slidein{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast .t-title{font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:2px}.toast .t-title .ok{color:var(--green)}
.toast .t-sub{color:var(--text-secondary)}.toast .t-sub a{color:var(--primary);text-decoration:none;font-weight:600;margin-left:4px}
.perm-scroll{flex:1;overflow:auto;padding:16px}
.perm-card{background:var(--bg-card);border:1px solid var(--border-theme);border-radius:8px;margin-bottom:16px;overflow:hidden}
.perm-card h4{font-size:12px;font-weight:600;padding:10px 14px;background:var(--bg-muted);border-bottom:1px solid var(--border-theme);display:flex;align-items:center;gap:8px}
.perm-card h4 .hint{font-weight:400;color:var(--text-muted);font-size:11.5px}
.perm-card table{font-size:12.5px}
.perm-card td,.perm-card th{padding:8px 12px;border-bottom:1px solid var(--border-theme);text-align:left}
.perm-card th{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);background:var(--bg-card);position:sticky;top:0}
.pill{display:inline-block;border:1px solid var(--border-theme);border-radius:6px;padding:3px 9px;font-size:11.5px;color:var(--text-secondary);background:var(--bg-muted);cursor:pointer;user-select:none;white-space:nowrap}
.pill:hover{border-color:var(--border-strong)}
.pill.lv-lectura{background:var(--primary-soft);color:var(--primary);border-color:rgba(37,99,235,.3)}
.pill.lv-escritura{background:var(--amber-soft);color:var(--amber);border-color:rgba(217,119,6,.3)}
.pill.lv-edicion{background:rgba(22,163,74,.14);color:var(--green);border-color:rgba(22,163,74,.3)}
.pill.lv-sin{background:var(--bg-muted);color:var(--text-muted)}
.module{display:none;flex:1;min-height:0;overflow:hidden;flex-direction:column}
.module.active{display:flex}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.38);z-index:60;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border-theme);border-radius:10px;box-shadow:0 20px 50px rgba(15,23,42,.25);width:min(460px,94vw);max-height:90vh;display:flex;flex-direction:column;animation:pop .18s ease}
@keyframes pop{from{transform:translateY(8px) scale(.99);opacity:0}to{transform:none;opacity:1}}
.modal.drawer{margin-left:auto;height:100vh;max-height:100vh;border-radius:0;width:min(1020px,98vw);animation:slidr .2s ease}
@keyframes slidr{from{transform:translateX(20px);opacity:.6}to{transform:none;opacity:1}}
.modal.drawer .m-body{display:grid;grid-template-columns:1fr 1fr;gap:0 18px}
.modal.drawer .m-body .full{grid-column:1 / -1}
.m-head{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border-theme)}
.m-head h3{font-size:14px;font-weight:600}.m-head .sub{font-size:11.5px;color:var(--text-muted);font-weight:400;margin-top:2px}
.m-head .x{border:0;background:transparent;color:var(--text-muted);font-size:18px;line-height:1;padding:2px 6px;border-radius:5px}
.m-head .x:hover{background:var(--bg-muted);color:var(--text-primary)}
.m-body{padding:14px 16px;overflow-y:auto}
.m-foot{display:flex;justify-content:flex-end;gap:8px;padding:12px 16px;border-top:1px solid var(--border-theme)}
.field{margin-bottom:13px}
.field>label{display:block;font-size:11.5px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em}
.field select,.field input[type=text],.field textarea,.field input[type=date]{width:100%;border:1px solid var(--border-theme);border-radius:6px;padding:8px 10px;font:inherit;color:var(--text-primary);background:var(--bg-card);outline:none}
.field select:focus,.field input:focus,.field textarea:focus{border-color:var(--primary)}
.field textarea{resize:vertical;min-height:64px}
.hintline{font-size:11.5px;color:var(--text-muted);margin-top:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hintline.ver{color:var(--primary)}
.radio-row,.seg{display:flex;gap:6px;flex-wrap:wrap}.seg{margin-bottom:13px}
.radio-chip{border:1px solid var(--border-theme);border-radius:7px;padding:7px 11px;font-size:12.5px;color:var(--text-secondary);background:var(--bg-card);cursor:pointer;flex:1;text-align:center;min-width:90px}
.radio-chip.on{border-color:var(--primary);background:var(--primary-soft);color:var(--primary);font-weight:600}
.dropzone{border:1.5px dashed var(--border-strong);border-radius:8px;padding:16px;text-align:center;color:var(--text-muted);background:var(--bg-muted);cursor:pointer;font-size:12.5px}
.dropzone.has{border-style:solid;border-color:var(--primary);color:var(--text-primary);background:var(--primary-soft)}
.btn-m{border:1px solid var(--border-theme);background:var(--bg-card);border-radius:6px;padding:7px 14px;font-weight:500;color:var(--text-secondary)}
.btn-m.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.chips-input{display:flex;flex-wrap:wrap;gap:6px;border:1px solid var(--border-theme);border-radius:6px;padding:6px;min-height:38px}
.chip-p{display:inline-flex;align-items:center;gap:5px;background:var(--bg-muted);border:1px solid var(--border-theme);border-radius:14px;padding:3px 9px;font-size:11.5px;color:var(--text-secondary)}
.chip-p.ext{background:var(--amber-soft);color:var(--amber);border-color:rgba(217,119,6,.3)}
.chip-p .rm{cursor:pointer;font-weight:700;opacity:.7}.chip-p .rm:hover{opacity:1}
.chips-input input{border:0;outline:0;flex:1;min-width:120px;font:inherit;background:transparent;color:var(--text-primary)}
.multi{display:flex;flex-wrap:wrap;gap:6px}
.multi .opt{border:1px solid var(--border-theme);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--text-secondary);cursor:pointer;user-select:none}
.multi .opt.on{background:var(--primary-soft);color:var(--primary);border-color:rgba(37,99,235,.3);font-weight:600}
.readonly-box{background:var(--bg-muted);border:1px solid var(--border-theme);border-radius:6px;padding:7px 10px;font-size:12.5px;color:var(--text-secondary);display:flex;align-items:center;gap:7px}
@media(max-width:640px){.modal.drawer .m-body{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand">
      <span class="glyph">▣</span><span>Obra Digital MOP</span><span class="sep">·</span>
      <span class="contract">Contrato: "Reposición Ruta K-60"</span>
      <span class="safi">SAFI 123456 · MP 4567-89-LR22</span>
    </div>
    <nav class="switcher" id="switcher">
      <button data-mod="carpeta" class="active">Carpeta Digital</button>
      <button data-mod="libro">Libro de Obras</button>
      <button data-mod="permisos">Permisos</button>
      <button class="gear" title="Configuración">⚙</button>
    </nav>
  </header>

  <div class="module active" id="mod-carpeta">
    <div class="subbar">
      <button class="hamb" title="Árbol">☰</button>
      <label>Tipo de contrato</label>
      <select id="contractSel">
        <option value="obras">Obras y Conservación</option>
        <option value="asesorias">Asesorías</option>
        <option value="consultorias">Consultorías</option>
        <option value="aif">AIF (Asesoría a la IF)</option>
        <option value="estudios">Estudios, Diseños</option>
        <option value="apr">APR (Agua Potable Rural)</option>
      </select>
      <div class="crumb" id="crumb"></div>
      <div class="spacer"></div>
      <div class="search">🔍 <input placeholder="Buscar…"></div>
    </div>
    <div class="body">

function slug(s){return s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"").slice(0,26)}
function esc(s){return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function todayStr(){const d=new Date();return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear()}

/* ===== Estado Carpeta ===== */
let curContract="obras";
let curSel=null;
const expanded=new Set();
const uploads={};
let _idc=0;
function ensureId(node){if(node._id==null)node._id=++_idc;return node._id}
function uKey(node){return curContract+"::"+node.n}
function mkFile(tipo,v,total){return{tipo,archivo:slug(tipo)+(v>1?"_v"+v:"")+".pdf",ver:v,fecha:DATES[v%DATES.length],autor:AUTHORS[v%AUTHORS.length],obs:"",vig:v===total,estado:"activo"}}
function getUploads(node){
  const k=uKey(node);
  if(!uploads[k]){uploads[k]=[];const seed=(SEED[curContract]||{})[node.n];if(seed)Object.entries(seed).forEach(([t,n])=>{for(let v=1;v<=n;v++)uploads[k].push(mkFile(t,v,n))});}
  return uploads[k];
}
function countTipo(node,tipo){return getUploads(node).filter(f=>f.tipo===tipo&&f.estado!=="archivado").length}
function distinctTipos(node){const base=(node.f||[]).slice();getUploads(node).forEach(f=>{if(f.estado!=="archivado"&&!base.includes(f.tipo))base.push(f.tipo)});return base}
function folderCount(node){let n=getUploads(node).filter(f=>f.estado!=="archivado").length;(node.c||[]).forEach(c=>n+=folderCount(c));return n}
function nextVersion(node,tipo){const ex=getUploads(node).filter(f=>f.tipo===tipo);return ex.length?Math.max(...ex.map(f=>f.ver||1))+1:1}
function findChain(target,nodes,chain){for(const n of (nodes||CONTRACTS[curContract].tree)){const c2=chain.concat(n);if(n===target)return c2;if(n.c){const r=findChain(target,n.c,c2);if(r)return r}}return null}

/* ===== Árbol Carpeta ===== */
function buildFolder(node,depth){
  ensureId(node);
  const wrap=document.createElement("div");
  const row=document.createElement("div");
  row.className="node-row folder"+(node.custom?" custom":"");
  row.style.paddingLeft=(8+depth*15)+"px";row.dataset.fid=node._id;
  const op=expanded.has(node._id);
  row.innerHTML=`<span class="chev ${op?'open':''}">▶</span><span class="ic">📁</span><span class="label" title="${esc(node.n+' '+node.l)}">${esc(node.n+' '+node.l)}</span><span class="count">${folderCount(node)}</span>`+
    `<span class="rowact"><button class="ra-add" title="Agregar archivo">＋</button><button class="ra-sub" title="Nueva subcarpeta">📁</button>${node.custom?'<button class="ra-del" title="Eliminar carpeta">🗑</button>':''}</span>`;
  wrap.appendChild(row);
  const kids=document.createElement("div");kids.className="children"+(op?"":" collapsed");
  const _tipos=distinctTipos(node);
  if(_tipos.length){
    const vid="v"+node._id, vo=(node.c&&node.c.length)?expanded.has(vid):true;
    const vwrap=document.createElement("div");
    const vrow=document.createElement("div");vrow.className="node-row virtual";vrow.style.paddingLeft=(8+(depth+1)*15)+"px";
    vrow.innerHTML=`<span class="chev ${vo?'open':''}">▶</span><span class="ic">📄</span><span class="label">Documentos de la carpeta</span><span class="count">${getUploads(node).length}</span>`;
    vwrap.appendChild(vrow);
    const vkids=document.createElement("div");vkids.className="children"+(vo?"":" collapsed");
    _tipos.forEach(t=>vkids.appendChild(buildFile(node,t,depth+2)));
    vwrap.appendChild(vkids);
    vrow.addEventListener("click",()=>{if(expanded.has(vid))expanded.delete(vid);else expanded.add(vid);vkids.classList.toggle("collapsed");vrow.querySelector(".chev").classList.toggle("open")});
    kids.appendChild(vwrap);
  }
  (node.c||[]).forEach(c=>kids.appendChild(buildFolder(c,depth+1)));
  wrap.appendChild(kids);
  row.addEventListener("click",e=>{
    if(e.target.classList.contains("ra-add")){e.stopPropagation();selectFolder(node);openAddArchivo(node);return}
    if(e.target.classList.contains("ra-sub")){e.stopPropagation();openNewSubfolder(node);return}
    if(e.target.classList.contains("ra-del")){e.stopPropagation();deleteFolder(node);return}
    if(expanded.has(node._id))expanded.delete(node._id);else expanded.add(node._id);
    kids.classList.toggle("collapsed");row.querySelector(".chev").classList.toggle("open");
    selectFolder(node);
  });
  return wrap;
}
function buildFile(node,tipo,depth){
  const wrap=document.createElement("div");
  const row=document.createElement("div");
  row.className="node-row file";row.style.paddingLeft=(8+depth*15+14)+"px";
  row.dataset.fid=node._id;row.dataset.tipo=tipo;
  const c=countTipo(node,tipo);

function renderTree(){

  arow.innerHTML=`<span class="chev leaf">▶</span><span class="ic">🗃️</span><span class="label">Archivados</span><span class="count">${archivedFiles.filter(a=>a.contract===curContract).length}</span>`;

function applySelection(){
  document.querySelectorAll("#tree .node-row.sel").forEach(r=>r.classList.remove("sel"));

    if(r.dataset.fid==curSel.node._id){
      if(curSel.kind==="folder"&&!r.dataset.tipo)sel=r;

function expandAncestors(node){const ch=findChain(node,null,[]);if(ch)ch.slice(0,-1).forEach(a=>expanded.add(a._id))}
function selectFolder(node){curSel={kind:"folder",node};expandAncestors(node);applySelection();setCrumb(node)}
function selectFile(node,tipo){curSel={kind:"file",node,tipo};expandAncestors(node);expanded.add("v"+node._id);applySelection();setCrumb(node,tipo)}
function setCrumb(node,tipo){

function openVerArchivo(node,tipo,v){

const archivedFiles=[];
function archivarArchivo(node,tipo,f){
  f.estado="archivado";

function restaurarArchivo(a){a.f.estado="activo";const i=archivedFiles.indexOf(a);if(i>=0)archivedFiles.splice(i,1);renderTree();renderDetailArchivados();}
function renderDetailArchivados(){

function updateStatusCarpeta(){

document.getElementById("contractSel").addEventListener("change",e=>{curContract=e.target.value;const first=CONTRACTS[curContract].tree[0];expanded.add(ensureId(first));curSel={kind:"folder",node:first};renderTree();setCrumb(first)});

/* ===== Crear / eliminar carpetas ===== */
function newChildNumber(parent){const kids=parent.c||[];let k=kids.length+1;const ex=n=>kids.some(c=>c.n===n);while(ex(parent.n+"-"+k))k++;return parent.n+"-"+k}
function newRootNumber(){const t=CONTRACTS[curContract].tree;let k=t.length+1;const ex=n=>t.some(c=>c.n===String(n));while(ex(k))k++;return String(k)}
function openNewSubfolder(parent){
  openModal(`<div class="m-head"><div><h3>Nueva subcarpeta</h3><div class="sub">Dentro de: ${esc(parent.n+' '+parent.l)}</div></div><button class="x" data-close>✕</button></div>
   <div class="m-body"><div class="field"><label>Nombre de la subcarpeta</label><input type="text" id="nfName" placeholder="Ej.: Antecedentes adicionales"></div>
   <div class="hintline">ⓘ Se numerará automáticamente como <b>${esc(newChildNumber(parent))}</b>. Las carpetas creadas se pueden eliminar; las de la estructura maestra no.</div></div>
   <div class="m-foot"><button class="btn-m" data-close>Cancelar</button><button class="btn-m primary" id="nfSave">Crear</button></div>`,"modal");
  const inp=document.getElementById("nfName");inp.focus();
  document.getElementById("nfSave").onclick=()=>{
    const name=inp.value.trim();if(!name){inp.focus();return}
    if(!parent.c)parent.c=[];
    const node={n:newChildNumber(parent),l:name,f:[],c:[],custom:true};
    parent.c.push(node);ensureId(node);expanded.add(parent._id);
    closeModal();curSel={kind:"folder",node};renderTree();setCrumb(node);
  };
}
function openNewRootFolder(){
  openModal(`<div class="m-head"><div><h3>Nueva carpeta</h3><div class="sub">Nivel raíz del expediente</div></div><button class="x" data-close>✕</button></div>
   <div class="m-body"><div class="field"><label>Nombre de la carpeta</label><input type="text" id="nfName" placeholder="Ej.: Documentos especiales"></div>
   <div class="hintline">ⓘ Se numerará como <b>${esc(newRootNumber())}</b>.</div></div>
   <div class="m-foot"><button class="btn-m" data-close>Cancelar</button><button class="btn-m primary" id="nfSave">Crear</button></div>`,"modal");
  const inp=document.getElementById("nfName");inp.focus();
  document.getElementById("nfSave").onclick=()=>{
    const name=inp.value.trim();if(!name){inp.focus();return}
    const node={n:newRootNumber(),l:name,f:[],c:[],custom:true};
    CONTRACTS[curContract].tree.push(node);ensureId(node);
    closeModal();curSel={kind:"folder",node};renderTree();setCrumb(node);
  };
}
function deleteFolder(node){
  if(!node.custom)return;
  openModal(`<div class="m-head"><div><h3>Eliminar carpeta</h3></div><button class="x" data-close>✕</button></div>
   <div class="m-body"><p style="font-size:13px;color:var(--text-secondary)">¿Eliminar la carpeta <b>${esc(node.n+' '+node.l)}</b> y su contenido? Esta acción no se puede deshacer.</p></div>
   <div class="m-foot"><button class="btn-m" data-close>Cancelar</button><button class="btn-m primary" style="background:var(--red);border-color:var(--red)" id="delOk">Eliminar</button></div>`,"modal");
  document.getElementById("delOk").onclick=()=>{
    const ch=findChain(node,null,[]);const parent=ch&&ch.length>1?ch[ch.length-2]:null;
    if(parent){parent.c=parent.c.filter(c=>c!==node)}else{CONTRACTS[curContract].tree=CONTRACTS[curContract].tree.filter(c=>c!==node)}

  };
}

/* ============ Libro de Obras ============ */
let curBook=BOOKS[0];
let curMonthKey=null;          // "yyyy-mm" o null = todo el libro
let openFolioId=null;          // acordeón: solo uno abierto
const expandedB=new Set();     // expansión de libros/años en el índice
const MES=["","enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const LIBRO_TEMA={calidad:"1.1 Gestión de la Calidad",pr:"1.2 Prevención de Riesgos",ma:"1.3 Medio Ambiente",pc:"1.4 Participación Ciudadana"};
function ymOf(fo){const p=fo.fecha.split("/");return{y:p[2],m:p[1],key:p[2]+"-"+p[1]}}
function groupYM(book){const g={};book.folios.filter(f=>f.estado!=="archivado").forEach(fo=>{const {y,m}=ymOf(fo);(g[y]=g[y]||{});g[y][m]=(g[y][m]||0)+1});return g}
function renderBooks(){
  const el=document.getElementById("books");el.innerHTML="";
  BOOKS.forEach(b=>{
    if(b.sep){const s=document.createElement("div");s.style.cssText="padding:8px 12px 4px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);font-weight:600";s.textContent="── "+b.sep+" ──";el.appendChild(s);return}
    const wrap=document.createElement("div");
    const open=expandedB.has(b.id);
    const r=document.createElement("div");r.className="node-row folder"+((b.id===curBook.id&&!curMonthKey)?" sel":"");
    r.innerHTML=`<span class="chev ${open?'open':''}">▶</span><span class="ic" style="color:${b.id===curBook.id?'var(--primary)':'var(--text-muted)'}">${b.id===curBook.id?'●':'○'}</span><span class="label">${esc(b.label)}</span>${b.abierto===false?'<span class="chip" style="background:var(--bg-muted-2);color:var(--text-muted);margin-right:4px">🔒 cerrado</span>':''}${b.warn?`<span class="chip incid" style="margin-right:4px">⚠️${b.warn}</span>`:""}<span class="count">${b.folios.filter(f=>f.estado!=="archivado").length}</span>`;
    wrap.appendChild(r);
    const kids=document.createElement("div");kids.className="children"+(open?"":" collapsed");
    const g=groupYM(b);
    Object.keys(g).sort((a,c)=>c-a).forEach(y=>{
      const yk=b.id+"|"+y, yo=expandedB.has(yk);
      const yr=document.createElement("div");yr.className="node-row folder";yr.style.paddingLeft="26px";
      const ytot=Object.values(g[y]).reduce((a,c)=>a+c,0);
      yr.innerHTML=`<span class="chev ${yo?'open':''}">▶</span><span class="ic">🗓️</span><span class="label">${y}</span><span class="count">${ytot}</span>`;
      wrap.appendChild(kids);kids.appendChild(yr);
      const mk=document.createElement("div");mk.className="children"+(yo?"":" collapsed");
      Object.keys(g[y]).sort((a,c)=>c-a).forEach(m=>{
        const key=y+"-"+m;
        const mr=document.createElement("div");mr.className="node-row file"+((curBook.id===b.id&&curMonthKey===key)?" sel":"");mr.style.paddingLeft="48px";
        mr.innerHTML=`<span class="chev leaf">▶</span><span class="ic">📅</span><span class="label">${MES[+m]||m} ${y}</span><span class="count">${g[y][m]}</span>`;
        mr.addEventListener("click",()=>{curBook=b;curMonthKey=key;openFolioId=null;renderBooks();renderFolios()});
        mk.appendChild(mr);
      });
      kids.appendChild(mk);
      yr.addEventListener("click",()=>{if(expandedB.has(yk))expandedB.delete(yk);else expandedB.add(yk);renderBooks()});
    });
    r.addEventListener("click",e=>{
      if(e.target.classList.contains("chev")){if(expandedB.has(b.id))expandedB.delete(b.id);else expandedB.add(b.id);renderBooks();return}
      expandedB.add(b.id);curBook=b;curMonthKey=null;openFolioId=null;renderBooks();renderFolios();
    });
    el.appendChild(wrap);
  });
  {const arr=document.createElement("div");arr.className="node-row folder";arr.style.marginTop="6px";
   const arN=BOOKS.filter(b=>!b.sep).reduce((a,b)=>a+b.folios.filter(f=>f.estado==="archivado").length,0);
   arr.innerHTML=`<span class="ic">🗃️</span><span class="label">Archivados</span><span class="count">${arN}</span>`;
   arr.addEventListener("click",showLibroArchivados);el.appendChild(arr);}
}
function folioLabel(fo){return fo.subtema||fo.rep||fo.tipo||fo.tema}
function folioDetailHTML(fo){
  let h=`<div class="fv-row"><span>Tema</span><span>${esc(fo.tema)}</span></div><div class="fv-row"><span>Sub-tema</span><span>${esc(fo.subtema||"—")}</span></div><div class="fv-row"><span>Tipo</span><span>${esc(fo.tipo||"—")}</span></div><div class="fv-row"><span>Autor</span><span>${esc(fo.autor||"—")}</span></div><div class="fv-row"><span>Reporte</span><span>${esc(fo.rep||"—")}</span></div><div class="divider">Libros vinculados</div><div style="display:flex;gap:6px;flex-wrap:wrap">${(fo.vinc||[]).map(v=>`<span class="chip book">⬡ ${esc(v)}</span>`).join("")}</div>`;

function renderFolios(){
  document.getElementById("libroActivo").innerHTML="&nbsp;"+curBook.label;
  const ml=curMonthKey?(" · "+(MES[+curMonthKey.split("-")[1]]||"")+" "+curMonthKey.split("-")[0]):"";

    const _ab=div.querySelector(".fo-arch");if(_ab)_ab.addEventListener("click",ev=>{ev.stopPropagation();fo.estado="archivado";openFolioId=null;renderBooks();renderFolios();showToast(`Entrada ${fo.f} archivada → Archivados`)});

function showLibroArchivados(){

  }
  render();
  document.getElementById("alModo").addEventListener("click",e=>{const c=e.target.closest("[data-m]");if(!c)return;document.querySelectorAll("#alModo .radio-chip").forEach(x=>x.classList.remove("on"));c.classList.add("on");modo=c.dataset.m;render()});
  document.getElementById("alSave").addEventListener("click",()=>{
    let label,tipo;
    const TMAP={"Gestión de Calidad":"calidad","Prevención de Riesgos":"pr","Medio Ambiente":"ma","Participación Ciudadana":"pc","Comunicaciones":"comunic"};
    if(modo==="tematico"){label=document.getElementById("alSel").value;tipo=TMAP[label]||"tematico";}
    else{if(!esp.size)return;label=[...esp].join(" + ");tipo="especialidad";}
    const nb={id:"b"+Date.now(),label,tipo,folios:[],abierto:false};
    if(tipo==="especialidad")BOOKS.push(nb);else{const i=BOOKS.findIndex(b=>b.sep);BOOKS.splice(i<0?BOOKS.length:i,0,nb);}
    curBook=nb;curMonthKey=null;openFolioId=null;closeModal();renderBooks();renderFolios();renderPermisos();
  });
}

/* ============ Delegación ============ */
document.body.addEventListener("click",e=>{if(e.target.closest(".js-apertura"))openApertura();if(e.target.closest(".js-newentry")){if(curBook&&curBook.abierto===false)openApertura();else openNuevaEntrada();}});
document.getElementById("abrirLibro").addEventListener("click",openAbrirLibro);
document.getElementById("addRootFolder").addEventListener("click",openNewRootFolder);

/* ============ Init ============ */
const f0=CONTRACTS.obras.tree[0];expanded.add(ensureId(f0));curSel={kind:"folder",node:f0};
renderTree();setCrumb(f0);renderBooks();renderFolios();renderPermisos();
</script>
</body>
</html>
