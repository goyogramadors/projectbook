<style>
  /* Paleta RESPONSIVA: hereda el color de la barra (currentColor = --bar-foreground)
     y el fondo de la barra (--bar). Funciona en todos los temas sin variantes. */
  #ab-nav-root{--accent:var(--destructive,#D9381E);--font-body:'Inter',system-ui,sans-serif;
    position:relative;font-family:var(--font-body);background:transparent;display:flex;width:100%;height:100%;
    color:var(--bar-foreground);}
  #ab-nav-scene{width:100%;height:100%;overflow:visible;display:block;}

  #ab-nav-root .ab-fill-soft{fill:currentColor;fill-opacity:.10;}
  #ab-nav-root .ab-fill-mid{fill:currentColor;fill-opacity:.20;}
  #ab-nav-root .ab-fill-dark{fill:currentColor;fill-opacity:.34;}
  #ab-nav-root .ab-glass{fill:currentColor;fill-opacity:.06;}
  #ab-nav-root .ab-ground-top{fill:currentColor;fill-opacity:.08;}
  #ab-nav-root .ab-ground-side{fill:currentColor;fill-opacity:.24;}
  #ab-nav-root .ab-ground-side2{fill:currentColor;fill-opacity:.15;}
  #ab-nav-root .ab-bar2{fill:currentColor;fill-opacity:.30;}
  #ab-nav-root .ab-accent-fill{fill:var(--accent);} #ab-nav-root .ab-accent-side{fill:#B22D17;} #ab-nav-root .ab-accent-dark{fill:#9E2814;}
  #ab-nav-root .ab-pin{fill:currentColor;fill-opacity:.6;}
  #ab-nav-root .ab-stroke{stroke:currentColor;stroke-width:1.5;stroke-linejoin:round;stroke-linecap:round;}
  #ab-nav-root .ab-glass.ab-stroke{stroke-width:1;}

  #ab-nav-root .ab-line{stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:5 6;opacity:.45;transition:stroke .3s,opacity .3s;}
  #ab-nav-root .ab-line.active{stroke:var(--accent);opacity:1;animation:ab-nav-flow .7s linear infinite;}
  @keyframes ab-nav-flow{to{stroke-dashoffset:-22;}}

  #ab-nav-root .ab-float{animation:ab-nav-bob 6s ease-in-out infinite;animation-delay:var(--d,0s);}
  @keyframes ab-nav-bob{
    0%,100%{transform:translate(calc(var(--fx,0px)*-1),calc(var(--fy,0px)*-1));}
    50%{transform:translate(var(--fx,0px),var(--fy,0px));}
  }
  #ab-nav-root .ab-node{cursor:pointer;}
  #ab-nav-root .ab-node .ab-lift{transition:transform .25s ease;}
  #ab-nav-root .ab-node:hover .ab-lift,#ab-nav-root .ab-node:focus .ab-lift{transform:translateY(-7px);}
  #ab-nav-root .ab-node:focus{outline:none;}
  #ab-nav-root .ab-node:hover .ab-stroke,#ab-nav-root .ab-node:focus .ab-stroke{stroke:var(--accent);}
  #ab-nav-root .ab-node.active .ab-stroke{stroke:var(--accent);stroke-width:2;}
  #ab-nav-root .ab-plate{cursor:pointer;}

  #ab-nav-root .ab-floor1{animation:ab-nav-exp1 7s ease-in-out infinite;}
  #ab-nav-root .ab-floor2{animation:ab-nav-exp2 7s ease-in-out infinite;}
  @keyframes ab-nav-exp1{0%,22%{transform:translateY(0);}50%{transform:translateY(-18px);}78%,100%{transform:translateY(0);}}
  @keyframes ab-nav-exp2{0%,22%{transform:translateY(0);}50%{transform:translateY(-40px);}78%,100%{transform:translateY(0);}}

  #ab-nav-root .ab-3d-sil,#ab-nav-root .ab-3d-vol,#ab-nav-root .ab-3d-face{font-family:var(--font-body);font-size:58px;font-weight:700;text-anchor:end;}
  #ab-nav-root .ab-3d-sil{fill:currentColor;stroke:currentColor;stroke-width:2.6;stroke-linejoin:round;}
  #ab-nav-root .ab-3d-vol{fill:currentColor;fill-opacity:.45;}
  #ab-nav-root .ab-3d-face{fill:var(--accent);stroke:currentColor;stroke-width:1.2;stroke-linejoin:round;paint-order:stroke;}
  #ab-nav-root .ab-label-rule{fill:var(--accent);}
</style>
