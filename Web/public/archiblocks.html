<style>
  #ab-root{--accent:#D9381E;--font-title:'Urbanist',system-ui,sans-serif;--font-body:'Inter',system-ui,sans-serif;}
  #ab-root[data-theme="light"]{
    --bg:#F9FAFB;--panel:#FFFFFF;--stroke:#374151;
    --fill-soft:#FFFFFF;--fill-mid:#E9ECF1;--fill-dark:#CBD0D8;--glass:#EDF0F4;
    --ground-top:#EDEFF2;--ground-side:#C2C7D0;--ground-side2:#D4D8DF;--bar:#9CA3AF;
    --line:#9CA3AF;--pin:#9CA3AF;--ink:#111827;--ink-soft:#7A828E;--border:#E5E7EB;
  }
  #ab-root[data-theme="dark"]{
    --bg:#0B0E14;--panel:#121826;--stroke:#A8B0BD;
    --fill-soft:#222C3A;--fill-mid:#19212E;--fill-dark:#0E141D;--glass:#2C3848;
    --ground-top:#161D28;--ground-side:#0C1118;--ground-side2:#121925;--bar:#4B5563;
    --line:#4B5563;--pin:#6B7280;--ink:#F3F4F6;--ink-soft:#8A93A0;--border:#1F2937;
  }
  #ab-root *{box-sizing:border-box;}
  #ab-root{position:relative;font-family:var(--font-body);background:var(--bg);border-radius:16px;padding:10px;transition:background .4s ease;}
  #ab-scene{width:100%;height:auto;overflow:visible;display:block;}
  .ab-theme-toggle{position:absolute;top:14px;left:14px;width:36px;height:36px;border-radius:50%;
    border:1px solid var(--border);background:var(--panel);color:var(--ink);cursor:pointer;font-size:16px;z-index:5;transition:.25s;}
  .ab-theme-toggle:hover{border-color:var(--accent);color:var(--accent);}

  .ab-fill-soft{fill:var(--fill-soft);} .ab-fill-mid{fill:var(--fill-mid);} .ab-fill-dark{fill:var(--fill-dark);}
  .ab-glass{fill:var(--glass);}
  .ab-ground-top{fill:var(--ground-top);} .ab-ground-side{fill:var(--ground-side);} .ab-ground-side2{fill:var(--ground-side2);}
  .ab-bar2{fill:var(--bar);opacity:.8;}
  .ab-accent-fill{fill:var(--accent);} .ab-accent-side{fill:#B22D17;} .ab-accent-dark{fill:#9E2814;}
  .ab-pin{fill:var(--pin);}
  .ab-stroke{stroke:var(--stroke);stroke-width:1.5;stroke-linejoin:round;stroke-linecap:round;}
  .ab-glass.ab-stroke{stroke-width:1;}

  .ab-line{stroke:var(--line);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:5 6;opacity:.6;transition:stroke .3s,opacity .3s;}
  .ab-line.active{stroke:var(--accent);opacity:1;animation:ab-flow .7s linear infinite;}
  @keyframes ab-flow{to{stroke-dashoffset:-22;}}

  /* flotacion en el sentido (iso) de la linea */
  .ab-float{animation:ab-bob 6s ease-in-out infinite;animation-delay:var(--d,0s);}
  @keyframes ab-bob{
    0%,100%{transform:translate(calc(var(--fx,0px)*-1),calc(var(--fy,0px)*-1));}
    50%{transform:translate(var(--fx,0px),var(--fy,0px));}
  }
  .ab-node{cursor:pointer;}
  .ab-node .ab-lift{transition:transform .25s ease;}
  .ab-node:hover .ab-lift,.ab-node:focus .ab-lift{transform:translateY(-7px);}
  .ab-node:focus{outline:none;}
  .ab-node:hover .ab-stroke,.ab-node:focus .ab-stroke{stroke:var(--accent);}
  .ab-node.active .ab-stroke{stroke:var(--accent);stroke-width:2;}
  .ab-plate{cursor:pointer;}

  /* edificio: armado / desarmado de las 3 plantas */
  .ab-floor1{animation:ab-exp1 7s ease-in-out infinite;}
  .ab-floor2{animation:ab-exp2 7s ease-in-out infinite;}
  @keyframes ab-exp1{0%,22%{transform:translateY(0);}50%{transform:translateY(-18px);}78%,100%{transform:translateY(0);}}
  @keyframes ab-exp2{0%,22%{transform:translateY(0);}50%{transform:translateY(-40px);}78%,100%{transform:translateY(0);}}

  /* etiqueta isometrica */
  .ab-3d-sil,.ab-3d-vol,.ab-3d-face{font-family:var(--font-body);font-size:40px;font-weight:700;}
  .ab-3d-sil{fill:var(--stroke);stroke:var(--stroke);stroke-width:2.6;stroke-linejoin:round;}
  .ab-3d-vol{fill:var(--fill-soft);}
  .ab-3d-face{fill:var(--fill-soft);stroke:var(--stroke);stroke-width:1.4;stroke-linejoin:round;paint-order:stroke;}
  .ab-label-rule{fill:var(--accent);}
</style>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Urbanist:wght@600;700&display=swap" rel="stylesheet">

<script>
(function(){
  var root=document.getElementById('ab-root'); var scene=document.getElementById('ab-scene');
  var NAMES={edificio:'Inicio',terreno:'Terreno',permisos:'Permisos',carpeta:'Carpeta Digital',
    botonera:'Datos Proyecto',ductos:'Obra',galvano:'Admin',
    archivador:'Proyecto',libro:'Libro de Obra'};
  var l1=document.getElementById('lab-line1'),l2=document.getElementById('lab-line2');
  function fillLine(g,t){ g.querySelectorAll('text').forEach(function(e){ e.textContent=t; }); }
  function setLabel(txt){
    var w=txt.split(' ');   // baseline (linea naranja) fijo
    if(w.length<2){ fillLine(l1,''); fillLine(l2,txt); }
    else { var h=Math.ceil(w.length/2);
      fillLine(l1,w.slice(0,h).join(' ')); fillLine(l2,w.slice(h).join(' ')); }
  }
  document.getElementById('ab-theme-toggle').addEventListener('click',function(){
    root.setAttribute('data-theme',root.getAttribute('data-theme')==='light'?'dark':'light');
  });
  var active=null;
  function select(k,el){
    if(active){
      var pe=scene.querySelector('#node-'+active); if(pe) pe.classList.remove('active');
      var pl=document.getElementById('line-'+active); if(pl) pl.classList.remove('active');
    }
    active=k; el.classList.add('active');
    var line=document.getElementById('line-'+k); if(line) line.classList.add('active');
    setLabel(NAMES[k]||k);
  }
  scene.querySelectorAll('[data-node]').forEach(function(n){
    var k=n.getAttribute('data-node');
    n.addEventListener('click',function(){ select(k,n); });
    n.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); select(k,n); } });
    var line=document.getElementById('line-'+k);
    if(line){
      n.addEventListener('mouseenter',function(){ if(active!==k) line.classList.add('active'); });
      n.addEventListener('mouseleave',function(){ if(active!==k) line.classList.remove('active'); });
    }
  });
  // seleccion inicial: edificio
  var b=scene.querySelector('#node-edificio'); if(b) select('edificio',b);
})();
</script>
